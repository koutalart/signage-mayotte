name: Mise à jour météo & actus

on:
  schedule:
    - cron: '0 * * * *'   # Toutes les heures
  workflow_dispatch:        # Déclenchable manuellement depuis GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Récupérer météo + actus et générer data.json
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, re, datetime, sys

          result = {
            "updated": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%d %H:%M UTC"),
            "meteo": {},
            "ticker": [],
            "actus_mayotte": [],
            "actus_outremer": []
          }

          # ── MÉTÉO (open-meteo.com — gratuit, sans clé) ──
          try:
            url = (
              "https://api.open-meteo.com/v1/forecast"
              "?latitude=-12.744&longitude=45.221"
              "&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m,apparent_temperature,precipitation"
              "&hourly=temperature_2m,weathercode,precipitation_probability"
              "&timezone=Indian%2FMayotte&forecast_days=1"
            )
            with urllib.request.urlopen(url, timeout=10) as r:
              data = json.loads(r.read())
            cur = data["current"]
            code = cur["weathercode"]
            if code == 0:    cond, icon = "Ensoleillé",             "☀️"
            elif code <= 2:  cond, icon = "Partiellement nuageux",  "⛅"
            elif code <= 48: cond, icon = "Nuageux",                "☁️"
            elif code <= 82: cond, icon = "Pluie",                  "🌧️"
            else:            cond, icon = "Orageux",                "⛈️"
            result["meteo"] = {
              "temp":          round(cur["temperature_2m"]),
              "feels":         round(cur.get("apparent_temperature", cur["temperature_2m"])),
              "condition":     cond,
              "icon":          icon,
              "wind":          round(cur.get("windspeed_10m", 0)),
              "humidity":      round(cur.get("relativehumidity_2m", 0)),
              "precipitation": round(cur.get("precipitation", 0), 1),
              "hourly_temps":  data["hourly"]["temperature_2m"][:8],
              "hourly_codes":  data["hourly"]["weathercode"][:8]
            }
            print(f"Météo OK : {result['meteo']['temp']}°C {cond} · pluie {result['meteo']['precipitation']}mm")
          except Exception as e:
            print(f"Météo ERREUR : {e}", file=sys.stderr)

          # ── PARSE RSS / ATOM ──
          def clean_html(s):
            s = re.sub(r'<[^>]+>', '', s)
            for ent, rep in [('&amp;','&'),('&lt;','<'),('&gt;','>'),('&quot;','"'),('&#39;',"'"),('&nbsp;',' ')]:
              s = s.replace(ent, rep)
            return s.strip()

          def parse_rss(xml, max_items=6):
            items = []
            # Support RSS <item> et Atom <entry>
            for m in re.finditer(r'<(?:item|entry)(?:\s[^>]*)?>(.+?)</(?:item|entry)>', xml, re.DOTALL):
              b = m.group(1)
              def get(tag):
                t = re.search(rf'<{tag}(?:\s[^>]*)?>(?:<!\[CDATA\[)?(.*?)(?:\]\]>)?</{tag}>', b, re.DOTALL)
                return clean_html(t.group(1)) if t else ''
              title = get('title') or ''
              desc  = get('description') or get('summary') or get('content') or ''
              # Cherche image : plusieurs patterns courants
              img = ''
              for pat in [
                r'<enclosure[^>]+url=["\']([^"\']+\.(?:jpg|jpeg|png|webp)[^"\']*)["\']',
                r'<media:content[^>]+url=["\']([^"\']+\.(?:jpg|jpeg|png|webp)[^"\']*)["\']',
                r'<media:thumbnail[^>]+url=["\']([^"\']+)["\']',
                r'url=["\']([^"\']+\.(?:jpg|jpeg|png|webp))["\']',
                r'<img[^>]+src=["\']([^"\']+\.(?:jpg|jpeg|png|webp))["\']',
              ]:
                img_m = re.search(pat, b, re.I)
                if img_m:
                  img = img_m.group(1)
                  break
              if title:
                items.append({"title": title, "desc": desc[:200], "img": img})
              if len(items) >= max_items: break
            return items

          # ── SCRAPING HTML direct la1ere.franceinfo.fr/mayotte ──
          def scrape_la1ere_mayotte(max_items=6):
            """Extrait les articles depuis la page HTML de Mayotte la 1ère."""
            items = []
            try:
              req = urllib.request.Request(
                'https://la1ere.franceinfo.fr/mayotte',
                headers={'User-Agent':'Mozilla/5.0 (compatible; SignageBot/1.0)','Accept-Language':'fr-FR,fr;q=0.9'}
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                html = r.read().decode('utf-8', errors='replace')
              # Cherche les blocs article : title + image + lien
              # Pattern : data-testid="article-card" ou class contenant article
              for m in re.finditer(
                r'<article[^>]*>(.*?)</article>',
                html, re.DOTALL | re.IGNORECASE
              ):
                block = m.group(1)
                # Titre (h2, h3, aria-label, ou alt d'image principale)
                t = re.search(r'<h[23][^>]*>(.*?)</h[23]>', block, re.DOTALL | re.IGNORECASE)
                if not t:
                  t = re.search(r'aria-label=["\']([^"\']{10,})["\']', block, re.IGNORECASE)
                title = clean_html(t.group(1)) if t else ''
                # Image (og:image dans block ou src d'img)
                img = ''
                for ipat in [
                  r'<img[^>]+src=["\']([^"\']+(?:jpg|jpeg|png|webp)[^"\']*)["\']',
                  r'data-src=["\']([^"\']+(?:jpg|jpeg|png|webp)[^"\']*)["\']',
                ]:
                  im = re.search(ipat, block, re.IGNORECASE)
                  if im:
                    img = im.group(1)
                    # Filtre les petites icônes ou logos (souvent < 100 px dans le nom)
                    if '24x24' in img or '32x32' in img or 'logo' in img.lower(): img = ''
                    else: break
                # Description (p ou span)
                d = re.search(r'<p[^>]*>(.*?)</p>', block, re.DOTALL | re.IGNORECASE)
                desc = clean_html(d.group(1))[:200] if d else ''
                if title and len(title) > 10:
                  items.append({'title': title, 'desc': desc, 'img': img})
                if len(items) >= max_items: break
              print(f"Scrape la1ere Mayotte : {len(items)} articles")
            except Exception as e:
              print(f"Scrape la1ere ERREUR : {e}", file=sys.stderr)
            return items

          # ── ACTUS MAYOTTE (rss.app → la1ere RSS → scrape HTML) ──
          FEEDS_MAYOTTE = [
            'https://rss.app/feeds/GcKEWQW6TsvCtxKv.xml',
            'https://la1ere.franceinfo.fr/mayotte/rss',
            'https://la1ere.franceinfo.fr/rss?slug=mayotte',
            'https://la1ere.franceinfo.fr/rss/mayotte.xml',
          ]
          for feed_url in FEEDS_MAYOTTE:
            try:
              req = urllib.request.Request(feed_url, headers={'User-Agent':'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=12) as r:
                xml = r.read().decode('utf-8', errors='replace')
              items = parse_rss(xml, 6)
              if items:
                result["actus_mayotte"] = items
                result["ticker"] = [it["title"] for it in items]
                print(f"Actus Mayotte OK ({feed_url}) : {len(items)} items")
                break
              else:
                print(f"Actus Mayotte vide ({feed_url}), essai suivant…")
            except Exception as e:
              print(f"Actus Mayotte ERREUR ({feed_url}) : {e}", file=sys.stderr)
          # Fallback : scraping HTML direct
          if not result["actus_mayotte"]:
            items = scrape_la1ere_mayotte(6)
            if items:
              result["actus_mayotte"] = items
              result["ticker"] = [it["title"] for it in items]
            else:
              print("Actus Mayotte : aucune source disponible", file=sys.stderr)

          # ── ACTUS OUTREMER (rss.app + fallback la1ere) ──
          FEEDS_OUTREMER = [
            'https://rss.app/feeds/vaBBXsAOb8cXY80B.xml',
            'https://la1ere.franceinfo.fr/rss',
            'https://la1ere.franceinfo.fr/outre-mer/rss',
          ]
          for feed_url in FEEDS_OUTREMER:
            try:
              req = urllib.request.Request(feed_url, headers={'User-Agent':'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=12) as r:
                xml = r.read().decode('utf-8', errors='replace')
              items = parse_rss(xml, 4)
              if items:
                result["actus_outremer"] = items
                print(f"Actus Outremer OK ({feed_url}) : {len(items)} items")
                break
              else:
                print(f"Actus Outremer vide ({feed_url}), essai suivant…")
            except Exception as e:
              print(f"Actus Outremer ERREUR ({feed_url}) : {e}", file=sys.stderr)
          if not result["actus_outremer"]:
            print("Actus Outremer : aucune source disponible", file=sys.stderr)

          with open('data.json', 'w', encoding='utf-8') as f:
            json.dump(result, f, ensure_ascii=False, indent=2)
          print("data.json généré ✓")
          PYEOF

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "data: mise à jour automatique $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
 
