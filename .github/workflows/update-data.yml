name: Mise à jour météo & actus

on:
  schedule:
    - cron: '0 * * * *'   # Toutes les heures
  workflow_dispatch:        # Déclenchable manuellement depuis GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Récupérer météo + actus et générer data.json
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, re, datetime, sys

          result = {
            "updated": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%d %H:%M UTC"),
            "meteo": {},
            "ticker": [],
            "actus_mayotte": [],
            "actus_outremer": []
          }

          # ── MÉTÉO ──
          try:
            url = (
              "https://api.open-meteo.com/v1/forecast"
              "?latitude=-12.744&longitude=45.221"
              "&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m,apparent_temperature,precipitation"
              "&hourly=temperature_2m,weathercode,precipitation_probability"
              "&timezone=Indian%2FMayotte&forecast_days=1"
            )
            with urllib.request.urlopen(url, timeout=10) as r:
              data = json.loads(r.read())
            cur = data["current"]
            code = cur["weathercode"]
            if code == 0:    cond, icon = "Ensoleillé",             "☀️"
            elif code <= 2:  cond, icon = "Partiellement nuageux",  "⛅"
            elif code <= 48: cond, icon = "Nuageux",                "☁️"
            elif code <= 82: cond, icon = "Pluie",                  "🌧️"
            else:            cond, icon = "Orageux",                "⛈️"
            result["meteo"] = {
              "temp":     round(cur["temperature_2m"]),
              "feels":    round(cur.get("apparent_temperature", cur["temperature_2m"])),
              "condition": cond,
              "icon":     icon,
              "wind":     round(cur.get("windspeed_10m", 0)),
              "humidity": round(cur.get("relativehumidity_2m", 0)),
              "precipitation": round(cur.get("precipitation", 0), 1),
              "hourly_temps": data["hourly"]["temperature_2m"][:8],
              "hourly_codes": data["hourly"]["weathercode"][:8]
            }
            print(f"Météo OK : {result['meteo']['temp']}°C {cond}")
          except Exception as e:
            print(f"Météo ERREUR : {e}", file=sys.stderr)

          # ── PARSE RSS ──
          def parse_rss(xml, max_items=6):
            items = []
            for m in re.finditer(r'<item>(.*?)</item>', xml, re.DOTALL):
              b = m.group(1)
              def get(tag):
                t = re.search(rf'<{tag}[^>]*>(?:<!\[CDATA\[)?(.*?)(?:\]\]>)?</{tag}>', b, re.DOTALL)
                return re.sub(r'<[^>]+>', '', t.group(1)).strip() if t else ''
              img_m = re.search(r'url="([^"]+\.(?:jpg|jpeg|png|webp))"', b, re.I) \
                   or re.search(r'<enclosure[^>]+url="([^"]+)"', b)
              items.append({
                "title": get('title').replace('&amp;','&').replace('&lt;','<').replace('&gt;','>'),
                "desc":  get('description')[:180],
                "img":   img_m.group(1) if img_m else ''
              })
              if len(items) >= max_items: break
            return items

          # ── ACTUS MAYOTTE ──
          try:
            with urllib.request.urlopen('https://rss.app/feeds/GcKEWQW6TsvCtxKv.xml', timeout=10) as r:
              xml = r.read().decode('utf-8', errors='replace')
            result["actus_mayotte"] = parse_rss(xml, 6)
            result["ticker"] = [it["title"] for it in result["actus_mayotte"]]
            print(f"Actus Mayotte OK : {len(result['actus_mayotte'])} items")
          except Exception as e:
            print(f"Actus Mayotte ERREUR : {e}", file=sys.stderr)

          # ── ACTUS OUTREMER ──
          try:
            with urllib.request.urlopen('https://rss.app/feeds/vaBBXsAOb8cXY80B.xml', timeout=10) as r:
              xml = r.read().decode('utf-8', errors='replace')
            result["actus_outremer"] = parse_rss(xml, 4)
            print(f"Actus Outremer OK : {len(result['actus_outremer'])} items")
          except Exception as e:
            print(f"Actus Outremer ERREUR : {e}", file=sys.stderr)

          with open('data.json', 'w', encoding='utf-8') as f:
            json.dump(result, f, ensure_ascii=False, indent=2)
          print("data.json généré ✓")
          PYEOF

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "data: mise à jour automatique $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
