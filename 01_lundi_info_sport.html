<!-- ══ S2 — MÉTÉO (version centrée haut) ══ -->
<div class="slide" id="s2">
  <div class="meteo-slide">
    <div class="meteo-header">
      <span class="meteo-badge">🌤️ Météo</span>
      <span class="meteo-loc-tag">📍 Mayotte</span>
    </div>
    
    <div class="meteo-main">
      <div class="meteo-icon-temp-row">
        <div class="meteo-big-icon" id="meteo-big-icon">⏳</div>
        <div class="meteo-big-temp" id="meteo-big-temp" style="color:#29B6F6;">--°</div>

      <div class="meteo-cond-txt" id="meteo-cond-txt">Chargement…</div>
      <div class="meteo-feels" id="meteo-feels">Ressenti --°C</div>
      
      <div class="meteo-details-row">

        <div class="meteo-detail-pill">
          <span class="mdp-icon">💧</span>

        <div class="meteo-detail-pill">

            <div class="mdp-lbl">Précip. mm</div>
